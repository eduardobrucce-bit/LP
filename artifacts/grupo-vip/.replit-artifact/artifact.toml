kind = "web"
previewPath = "/"
title = "Grupo VIP"
version = "1.0.0"
id = "artifacts/grupo-vip"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20481

[services.development]
run = "pnpm --filter @workspace/grupo-vip run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/grupo-vip", "run", "build" ]
publicDir = "artifacts/grupo-vip/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20481"
BASE_PATH = "/"
